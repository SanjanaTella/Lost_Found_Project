{% load static %} <!-- Load static files at the top -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Lost Item</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: url("{% static 'images/hitam-college.jpg' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .form-container {
            width: 50%;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.8); /* Slight background to improve form visibility */
            padding: 20px;
            border-radius: 8px;
        }
        .error-messages {
            color: red;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Report a Lost Item</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            {% if form.errors %}
                <div class="error-messages">
                    <h3>There were errors in your form:</h3>
                    {% for field in form %}
                        {% for error in field.errors %}
                            <p>{{ error }}</p>
                        {% endfor %}
                    {% endfor %}
                </div>
            {% endif %}

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
