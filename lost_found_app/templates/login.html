{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Lost & Found</title>
    <style>
        body {
            background: url("{% static 'images/hitam-college.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: rgba(61, 174, 230, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 300px;
        }
        .login-box img {
            width: 80px;
            margin-bottom: 15px;
        }
        .login-box h2 {
            margin-bottom: 20px;
        }
        .login-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .login-box button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #4e5bd1;
        }
        p {
            font-size: 14px;
        }
        p a {
            color: #764ba2;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="{% static 'images/hitam-logo.jpg' %}" alt="Login Icon">
        <h2>Login</h2>
        <form method="post">
            {% csrf_token %}
            <input type="email" placeholder="Email" name="email" required><br>
            <input type="password" placeholder="Password" name="password" required><br>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
</body>
</html>
